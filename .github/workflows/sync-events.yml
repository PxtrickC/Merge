name: Sync Merge Events

on:
  repository_dispatch:
    types: [merge-event]
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

# Prevent concurrent sync runs
concurrency:
  group: sync-events
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Incremental db.json update
        env:
          NUXT_PUBLIC_ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: node scripts/update-db.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-sync merge events $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Wait for Vercel deployment
        if: ${{ success() }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Waiting for Vercel deployment to complete..."
          COMMIT_SHA=$(git rev-parse HEAD)
          MAX_WAIT=300
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=5&state=READY")

            DEPLOYED_SHA=$(echo "$RESPONSE" | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const dep = (data.deployments || []).find(d => d.meta?.githubCommitSha === '$COMMIT_SHA');
              if (dep) console.log(dep.meta.githubCommitSha);
            " 2>/dev/null)

            if [ "$DEPLOYED_SHA" = "$COMMIT_SHA" ]; then
              echo "Vercel deployment for $COMMIT_SHA is READY!"
              break
            fi

            echo "  Not ready yet... (${ELAPSED}s elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "⚠️  Timed out waiting for Vercel deployment (${MAX_WAIT}s). Sending notifications anyway."
          fi

      - name: Send push notifications
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/send-notifications.mjs
